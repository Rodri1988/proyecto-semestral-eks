apiVersion: v1
kind: Service
metadata:
  name: tienda-backend
  namespace: tienda
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: tienda-backend
  ports:
  - name: ventas
    port: 8080
    targetPort: 8080
  - name: despachos
    port: 8081
    targetPort: 8081
