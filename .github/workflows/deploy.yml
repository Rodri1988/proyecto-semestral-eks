name: Dispara pipeline CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descarga el codigo del repositorio
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Iniciar sesion en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Construir y Publicar Frontend en ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tienda-frontend
        IMAGE_TAG: eks-v3
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./front_despacho
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Conectarse al cluster EKS y actualizar
      run: |
        aws eks update-kubeconfig --region us-east-1 --name Happy
        kubectl set image deployment/tienda-frontend tienda-frontend=870229276099.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:eks-v3 -n tienda
        kubectl rollout status deployment/tienda-frontend -n tienda
